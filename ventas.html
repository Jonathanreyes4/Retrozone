<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroZone - Ventas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>RetroZ</h1>
    <nav>
      <a href="dashboard.html">Inicio</a>
      <a href="productos.html">Productos</a>
      <a href="inventario.html">Inventario</a>
      <a class="activo" href="ventas.html">Ventas</a>
      <a href="alquileres.html">Alquileres</a>
      <a href="clientes.html">Clientes</a>
      <a href="factura.html">Factura</a>
      <a href="index.html">Salir</a>
    </nav>
  </header>

  <main>
    <h2>Registro de Ventas</h2>
    <div class="box">
      <label>Producto</label>
      <select id="productoVenta">
        <option value="">Cargando productos...</option>
      </select>
      <label>Cantidad</label>
      <input type="number" id="cantidadVenta" value="1" min="1">
      <button id="calcularVenta">Calcular total</button>
      <button id="registrarVenta">Registrar venta</button>
      <h3 id="totalVenta">Total: $0</h3>
      <p id="stockVenta"></p>
      <p id="mensajeVenta"></p>
    </div>

    <h2>Historial de Ventas</h2>
    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Total</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="tablaVentas">
      </tbody>
    </table>
  </main>

  <script src="app.js"></script>
</body>
</html>
