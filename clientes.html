<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroZone - Clientes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>RetroZ</h1>
    <nav>
      <a href="dashboard.html">Inicio</a>
      <a href="productos.html">Productos</a>
      <a href="inventario.html">Inventario</a>
      <a href="ventas.html">Ventas</a>
      <a href="alquileres.html">Alquileres</a>
      <a class="activo" href="clientes.html">Clientes</a>
      <a href="factura.html">Factura</a>
      <a href="index.html">Salir</a>
    </nav>
  </header>

  <main>
    <h2>Clientes</h2>
    <form class="formulario" id="formCliente">
      <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
      <input type="text" id="telefonoCliente" placeholder="Telefono">
      <input type="email" id="correoCliente" placeholder="Correo">
      <button type="submit">Registrar cliente</button>
    </form>

    <p id="mensajeCliente"></p>

    <table>
      <thead>
        <tr><th>Nombre</th><th>Telefono</th><th>Correo</th></tr>
      </thead>
      <tbody id="tablaClientes">
      </tbody>
    </table>
  </main>

  <script src="app.js"></script>
</body>
</html>
