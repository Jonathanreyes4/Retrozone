<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroZone - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
  <div class="login-logo">
    <div class="icono-logo">GM</div>
    <h1>RetroZ</h1>
    <p>Sistema de Gestion Retro Gaming</p>
  </div>

  <div class="login-box">
    <h2>Iniciar Sesion</h2>

    <form id="loginForm">
      <label>Usuario</label>
      <input type="text" id="usuario" placeholder="admin">

      <label>Contrasena</label>
      <input type="password" id="password" placeholder="1234">

      <button type="submit">Iniciar Sesion</button>
    </form>

    <p class="recuperar">Olvidaste tu contrasena? <span>Recuperar</span></p>
    <small>Usuario: admin | Contrasena: 1234</small>
  </div>

  <script src="app.js"></script>
</body>
</html>
